<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumina Rugăciunii</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
 
  body {
    background-color: #f5f1e8;
    font-family: 'Crimson Text', Georgia, serif;
    margin: 0;
    padding: 50px 20px;
    color: #2a1f15;
    text-align: center;
  }
  h1 {
    color: #5a3e1b;
    font-weight: 600;
    font-size: 30px;
    margin: 25px 0 35px 0;
  }
  img {
    max-width: 350px;
    width: 90%;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 5px 18px rgba(0,0,0,0.25);
  }
  .btn {
    display: inline-block;
    margin-top: 35px;
    padding: 14px 28px;
    background-color: #5a3e1b;
    color: #f5f1e8;
    text-decoration: none;
    font-size: 18px;
    border-radius: 6px;
    transition: background-color 0.3s;
  }
  .btn:hover {
    background-color: #3d2912;
  }
</style>
</head>
<body>
  <img src="icoana.jpg" alt="Icoana Maicii Domnului Grabnic Ascultătoare">
  <h1>Icoana Maicii Domnului Grabnic Ascultătoare</h1>
  <a href="rugaciune.html" class="btn">Citește Rugăciunea</a>
</body>
</html>
